<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportar Incidente</title>
</head>
<body>
    <h1>Reportar Nuevo Incidente</h1>
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Guardar Incidente</button>
    </form>
    
    <p><a href="{% url 'incidents:home' %}">Cancelar y volver a la lista</a></p>
</body>
</html>
